services:
  postgres:
    image: postgres:16-alpine
    container_name: datn-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: DATN
    volumes:
      - datn_pg_data:/var/lib/postgresql/data

volumes:
  datn_pg_data:
